  {id:"edge",name:"Edge",color:"#14B8A6",hex:0x14B8A6,desc:"Connection strength"}
];
var TC={0:0xEF4444,1:0xF97316,2:0x3B82F6,3:0x4B5563};
var TN=["Skeleton 16-bit","Supporting 8-bit","Compressible 4-bit","Prunable 0-bit"];
var TCS=["#EF4444","#F97316","#60A5FA","#6B7280"];

var sigTh={};
sigDefs.forEach(function(s){

    var sc=D.signal_mlp_sampled[s.id]?D.signal_mlp_sampled[s.id][l]:[];
    var so=sc.slice().sort(function(a,b){return b-a});
    sigTh[s.id][l]=so[Math.floor(sc.length*0.04)]||999;
  }
});

var mode=0,aSigs=new Set(),showLbl=true,xrayOn=false;
var touring=false,tourIdx=0,tourTmr=null;

scene.background=new THREE.Color(0x080c18);

ren.setPixelRatio(Math.min(window.devicePixelRatio,2));

var dl2=new THREE.DirectionalLight(0x3b82f6,0.3);dl2.position.set(-15,10,-15);scene.add(dl2);

function makeLabel(text,color,w,h,fs){
  var cv=document.createElement("canvas");cv.width=w||80;cv.height=h||24;
  var cx=cv.getContext("2d");cx.fillStyle=color||"#fff";
  cx.font="bold "+(fs||14)+"px monospace";cx.textAlign="center";cx.fillText(text,cv.width/2,cv.height*0.75);
  return new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,opacity:0.9,depthWrite:false}));
}

function build(){
  while(MG.children.length>0)MG.remove(MG.children[0]);
  neuronMs=[];headMs=[];connLines=[];skelPos=[];
  var nGeo=new THREE.SphereGeometry(0.14,6,6);
  var nGeoSkel=new THREE.SphereGeometry(0.22,10,10);
  var projD=MD/3,nPerRow=20,nPerProj=Math.floor(NS/3);

  for(var l=0;l<NL;l++){
    var y=l*(LH+LG);
    var lg=new THREE.Group();lg.position.y=y;

    // ATTN: wireframe outline + faint fill
    var skelH=0;for(var hh=0;hh<NH;hh++){if(D.attn_tiers[l][hh]===0)skelH++;}
    var attnGeo=new THREE.BoxGeometry(BW,LH*0.65,AD);
    var attnEdge=new THREE.LineSegments(new THREE.EdgesGeometry(attnGeo),new THREE.LineBasicMaterial({color:0x4488aa,transparent:true,opacity:0.6}));
    attnEdge.position.set(0,0,-TD/2+AD/2);lg.add(attnEdge);
    var attnFill=new THREE.Mesh(attnGeo,new THREE.MeshPhongMaterial({color:0x1a2a44,transparent:true,opacity:0.15,depthWrite:false}));
    attnFill.position.set(0,0,-TD/2+AD/2);lg.add(attnFill);

    // Heads
    headMs[l]=[];
    var hW=(BW-1)/NH;
    for(var h=0;h<NH;h++){
      var tier=D.attn_tiers[l][h];
      var hC,hO,emC=0,emI=0;
      if(mode===0){hC=0x4a6a88;hO=0.65;}
      else if(mode===1){hC=tier===0?0xFCA5A5:0x4a6a88;hO=tier===0?0.8:0.5;}
      else if(mode===2){hC=0x3a5068;hO=0.4;}
      else{hC=TC[tier];hO=tier===0?0.95:tier===1?0.7:0.4;if(tier===0){emC=0xEF4444;emI=0.4;}}
      if(xrayOn){if(tier===0){hC=0xEF4444;hO=0.95;emC=0xEF4444;emI=0.5;}else{hO=0.04;}}
      var hMat=new THREE.MeshPhongMaterial({color:hC,transparent:true,opacity:hO,depthWrite:hO>0.3,emissive:emC,emissiveIntensity:emI});
      var hM=new THREE.Mesh(new THREE.BoxGeometry(hW*0.75,LH*0.45,AD*0.5),hMat);
      hM.position.set(-BW/2+0.5+h*hW+hW/2,0,-TD/2+AD/2);
      hM.userData={type:"head",layer:l,head:h,tier:tier};
      lg.add(hM);headMs[l][h]=hM;
    }

    // MLP: 3 projections with wireframe + neurons
    var pNames=["gate_proj","up_proj","down_proj"];
    var pEdgeC=[0x33aa55,0x33aa88,0x44aa66];
    neuronMs[l]=[];

    for(var p=0;p<3;p++){
      var pz=-TD/2+AD+0.3+p*projD+projD/2;
      var pGeo=new THREE.BoxGeometry(BW,LH*0.7,projD*0.85);
      var pEdge=new THREE.LineSegments(new THREE.EdgesGeometry(pGeo),new THREE.LineBasicMaterial({color:pEdgeC[p],transparent:true,opacity:0.5}));
      pEdge.position.set(0,0,pz);lg.add(pEdge);
      var pFill=new THREE.Mesh(pGeo,new THREE.MeshPhongMaterial({color:0x0f1a18,transparent:true,opacity:0.08,depthWrite:false}));
      pFill.position.set(0,0,pz);pFill.userData={type:"proj",layer:l,proj:pNames[p]};lg.add(pFill);

      for(var ni=0;ni<nPerProj&&(p*nPerProj+ni)<NS;ni++){
        var nIdx=p*nPerProj+ni;
        var row=Math.floor(ni/nPerRow),col=ni%nPerRow;
        var nx=-BW/2+0.6+col*((BW-1.2)/nPerRow)+0.3;
        var nz=pz-projD/2+0.2+row*0.32;
        var nt=D.mlp_tiers_sampled[l][nIdx];
        var sigC=E.neuron_signal_counts[l][nIdx];
        var nCC,nO,nS,emC2=0,emI2=0,dw=false;

        if(xrayOn){if(nt===0){nCC=0xEF4444;nO=1;nS=2.5;emC2=0xEF4444;emI2=0.7;dw=true;}else{nCC=0;nO=0;nS=0;}}
        else if(mode===0){nCC=0xA0B4C8;nO=0.8;nS=0.9;}
        else if(mode===1){nCC=sigC>0?0xFCA5A5:0x708090;nO=sigC>0?0.85:0.4;nS=sigC>0?1.4:0.7;if(sigC>0){emC2=0xFCA5A5;emI2=0.2;}}
        else if(mode===2){nCC=0x4a5568;nO=0.2;nS=0.6;}
        else if(mode===3){nCC=TC[nt];nO=nt===0?1:nt===1?0.8:nt===3?0.15:0.45;nS=nt===0?2.2:nt===1?1.3:nt===3?0.4:0.75;if(nt===0){emC2=0xEF4444;emI2=0.6;dw=true;}}
        else{nCC=TC[nt];nO=nt===0?1:nt===1?0.55:nt===3?0:0.22;nS=nt===0?2.2:nt===1?1.0:nt===3?0:0.5;if(nt===0){emC2=0xEF4444;emI2=0.5;dw=true;}}

        var geo=nt===0?nGeoSkel:nGeo;
        var mat=new THREE.MeshPhongMaterial({color:nCC,transparent:true,opacity:nO,depthWrite:dw,emissive:emC2,emissiveIntensity:emI2});
        var nm=new THREE.Mesh(geo,mat);nm.position.set(nx,0,nz);nm.scale.setScalar(nS);
        nm.userData={type:"neuron",layer:l,idx:nIdx,tier:nt,sigCount:sigC,proj:pNames[p],signals:E.neuron_signal_ids[l][nIdx]};
        nm.renderOrder=nt===0?20:5;
        lg.add(nm);neuronMs[l].push(nm);
        if(nt===0)skelPos.push({x:nx,y:y,z:nz,l:l});
      }
    }

    // Labels
    if(showLbl){
      var lbl=makeLabel("L"+l,D.mlp_tier_counts[l].skel>0?"#f87171":"#7b8da4",48,24,16);
      lbl.position.set(-BW/2-1.5,0,0);lbl.scale.set(1.6,0.8,1);lg.add(lbl);
      if(l===0){
        var a1=makeLabel("ATTN","#4488aa",64,20,13);a1.position.set(0,0.55,-TD/2+AD/2);a1.scale.set(2.2,0.6,1);lg.add(a1);
        var g1=makeLabel("gate","#44aa66",56,18,12);g1.position.set(BW/2+1.5,0,-TD/2+AD+0.3+projD*0.5);g1.scale.set(1.8,0.5,1);lg.add(g1);
        var u1=makeLabel("up","#44aa88",56,18,12);u1.position.set(BW/2+1.5,0,-TD/2+AD+0.3+projD*1.5);u1.scale.set(1.8,0.5,1);lg.add(u1);
        var d1=makeLabel("down","#44aa66",56,18,12);d1.position.set(BW/2+1.5,0,-TD/2+AD+0.3+projD*2.5);d1.scale.set(1.8,0.5,1);lg.add(d1);
      }
    }
    MG.add(lg);
  }
  if(mode>=3||xrayOn)buildConns();
  MG.position.set(0,-NL*(LH+LG)/2,TD*0.3);
}

function buildConns(){
  var byL={};skelPos.forEach(function(p){if(!byL[p.l])byL[p.l]=[];byL[p.l].push(p);});
  var ls=Object.keys(byL).map(Number).sort(function(a,b){return a-b;});
  for(var i=0;i<ls.length-1;i++){
    var fr=byL[ls[i]],to=byL[ls[i+1]];if(!fr||!to)continue;var cnt=0;
    for(var fi=0;fi<fr.length;fi++){for(var ti=0;ti<to.length;ti++){
      if(cnt>12)break;var a=fr[fi],b=to[ti];
      if(Math.abs(a.x-b.x)>7||Math.abs(a.z-b.z)>3.5)continue;
      var curve=new THREE.QuadraticBezierCurve3(new THREE.Vector3(a.x,a.y,a.z),new THREE.Vector3((a.x+b.x)/2+(Math.random()-0.5)*0.6,(a.y+b.y)/2,(a.z+b.z)/2),new THREE.Vector3(b.x,b.y,b.z));
      var cm=new THREE.Mesh(new THREE.TubeGeometry(curve,6,0.025,4,false),new THREE.MeshBasicMaterial({color:0xEF4444,transparent:true,opacity:xrayOn?0.4:0.2}));
      MG.add(cm);connLines.push(cm);cnt++;
    }}
  }
  var heavy=ls.filter(function(ll){return byL[ll].length>=3;});
  for(var i=0;i<heavy.length-1;i++){
    var y1=heavy[i]*(LH+LG),y2=heavy[i+1]*(LH+LG);
    var curve=new THREE.QuadraticBezierCurve3(new THREE.Vector3(0,y1,0),new THREE.Vector3((Math.random()-0.5)*1.5,(y1+y2)/2,(Math.random()-0.5)*1.5),new THREE.Vector3(0,y2,0));
    var cm=new THREE.Mesh(new THREE.TubeGeometry(curve,10,0.07,6,false),new THREE.MeshBasicMaterial({color:0xEF4444,transparent:true,opacity:xrayOn?0.55:0.3}));
    MG.add(cm);connLines.push(cm);
  }
}

function updateSigs(){
  if(mode!==2)return;
  for(var l=0;l<NL;l++){
    neuronMs[l].forEach(function(nm){
      var ud=nm.userData;var hits=[];
      aSigs.forEach(function(sid){
        var sc=(D.signal_mlp_sampled[sid]&&D.signal_mlp_sampled[sid][ud.layer])?D.signal_mlp_sampled[sid][ud.layer][ud.idx]:0;
        var th=(sigTh[sid]&&sigTh[sid][ud.layer])?sigTh[sid][ud.layer]:999;
        if(sc>=th&&sc>0.001)hits.push(sigDefs.find(function(s){return s.id===sid;}));
      });
      if(hits.length>0){var c=new THREE.Color(hits[hits.length-1].color);nm.material.color.copy(c);nm.material.opacity=0.9;nm.material.depthWrite=true;nm.material.emissive.copy(c);nm.material.emissiveIntensity=0.3;nm.scale.setScalar(hits.length>2?2.5:hits.length>1?1.8:1.3);}
      else{nm.material.color.setHex(0x4a5568);nm.material.opacity=0.12;nm.material.depthWrite=false;nm.material.emissive.setHex(0);nm.scale.setScalar(0.5);}
    });
    for(var h=0;h<NH;h++){
      var hm=headMs[l][h];var hit=false,hc=0x3a5068;
      aSigs.forEach(function(sid){var scores=(D.signal_attn_scores[sid]&&D.signal_attn_scores[sid][l])?D.signal_attn_scores[sid][l]:[];var sc=scores[h]||0;var mx=Math.max.apply(null,scores.length?scores:[0]);if(sc>mx*0.3&&sc>0.01){hit=true;hc=sigDefs.find(function(s){return s.id===sid;}).hex;}});
      hm.material.color.setHex(hit?hc:0x3a5068);hm.material.opacity=hit?0.85:0.3;hm.material.emissive.setHex(hit?hc:0);hm.material.emissiveIntensity=hit?0.3:0;
    }
  }
}

var theta=0.8,phi=0.65,radius=48;
function updateCam(){cam.position.x=radius*Math.sin(phi)*Math.cos(theta);cam.position.y=radius*Math.cos(phi)+8;cam.position.z=radius*Math.sin(phi)*Math.sin(theta);cam.lookAt(0,8,1.5);}
function resetCam(){theta=0.8;phi=0.65;radius=48;updateCam();}
updateCam();

var isDrag=false,prevM={x:0,y:0};
can.addEventListener("mousedown",function(e){isDrag=true;prevM={x:e.clientX,y:e.clientY};});

  if(isDrag){theta+=(e.clientX-prevM.x)*0.005;phi=Math.max(0.15,Math.min(Math.PI-0.15,phi-(e.clientY-prevM.y)*0.005));prevM={x:e.clientX,y:e.clientY};updateCam();}
  var rect=can.getBoundingClientRect();var mx=((e.clientX-rect.left)/rect.width)*2-1;var my=-((e.clientY-rect.top)/rect.height)*2+1;
  rc.setFromCamera(new THREE.Vector2(mx,my),cam);var hits=rc.intersectObjects(MG.children,true);var tip=document.getElementById("tt");

    else if(ud.type==="head"){tip.style.display="block";tip.style.left=(e.clientX+10)+"px";tip.style.top=(e.clientY-8)+"px";tip.innerHTML="<b>L"+ud.layer+" Head "+ud.head+"</b><br>Tier: <span style='color:"+TCS[ud.tier]+"'>"+TN[ud.tier]+"</span>";}
    else if(ud.type==="proj"){tip.style.display="block";tip.style.left=(e.clientX+10)+"px";tip.style.top=(e.clientY-8)+"px";tip.innerHTML="<b>L"+ud.layer+" "+ud.proj+"</b><br>Shape: "+(ud.proj==="down_proj"?"2304x9216":"9216x2304");}
    else{tip.style.display="none";}
  }else{tip.style.display="none";}
});
can.addEventListener("mouseup",function(){isDrag=false;});
can.addEventListener("mouseleave",function(){isDrag=false;document.getElementById("tt").style.display="none";});

function startTour(){if(touring){stopTour();return;}touring=true;tourIdx=0;document.getElementById("tour-btn").classList.add("on");document.getElementById("tour-btn").textContent="Stop";document.getElementById("tov").style.display="block";playStep();}
function stopTour(){touring=false;if(tourTmr)clearTimeout(tourTmr);document.getElementById("tour-btn").classList.remove("on");document.getElementById("tour-btn").innerHTML="&#9654; Tour";document.getElementById("tov").style.display="none";}
function playStep(){
  if(!touring||tourIdx>=tourSteps.length){stopTour();return;}
  var s=tourSteps[tourIdx];animCam(s.t,s.p,s.r,800);
  mode=s.m;aSigs.clear();s.s.forEach(function(id){aSigs.add(id);});
  build();if(mode===2)updateSigs();renderUI();
  document.getElementById("ttx").innerHTML=s.txt;
  var dots="";for(var i=0;i<tourSteps.length;i++)dots+="<div class='tdot "+(i===tourIdx?"cur":i<tourIdx?"dn":"")+"'></div>";
  document.getElementById("tdo").innerHTML=dots;
  tourTmr=setTimeout(function(){tourIdx++;playStep();},6000);
}
function animCam(tT,pT,rT,dur){var t0=theta,p0=phi,r0=radius,start=performance.now();function tick(now){var prog=Math.min(1,(now-start)/dur);var ease=prog<0.5?2*prog*prog:(1-Math.pow(-2*prog+2,2)/2);theta=t0+(tT-t0)*ease;phi=p0+(pT-p0)*ease;radius=r0+(rT-r0)*ease;updateCam();if(prog<1)requestAnimationFrame(tick);}requestAnimationFrame(tick);}

function setMode(m){mode=m;aSigs.clear();xrayOn=false;document.getElementById("xr-btn").classList.remove("on");build();renderUI();}
function toggleSig(id){if(aSigs.has(id))aSigs.delete(id);else aSigs.add(id);updateSigs();renderUI();}
function toggleXray(){xrayOn=!xrayOn;document.getElementById("xr-btn").classList.toggle("on",xrayOn);build();renderUI();}
function toggleLbl(){showLbl=!showLbl;document.getElementById("lb-btn").classList.toggle("on",showLbl);build();}

  document.getElementById("modes").innerHTML=mhtml;
  document.querySelectorAll("[data-mode]").forEach(function(el){el.onclick=function(){setMode(parseInt(el.getAttribute("data-mode")));};});

  var ss=mode===2;
  document.getElementById("sig-title").style.display=ss?"":"none";
  document.getElementById("sig-list").style.display=ss?"":"none";
  if(ss){var shtml="";sigDefs.forEach(function(s){var on=aSigs.has(s.id);shtml+="<div class='sr "+(on?"ac":"")+"' data-sig='"+s.id+"'><div class='sd' style='background:"+s.color+";"+(on?"box-shadow:0 0 6px "+s.color:"opacity:.35")+"'></div><div><div style='font-weight:700;font-size:9px'>"+s.name+"</div><div style='font-size:7px;color:#4b5e7e'>"+s.desc+"</div></div></div>";});document.getElementById("sig-list").innerHTML=shtml;document.querySelectorAll("[data-sig]").forEach(function(el){el.onclick=function(){toggleSig(el.getAttribute("data-sig"));};});}

  var st=mode>=3;

  if(st){var ts={s:0,u:0,c:0,p:0};D.mlp_tier_counts.forEach(function(cc){ts.s+=cc.skel;ts.u+=cc.sup;ts.c+=cc.comp;ts.p+=cc.prune;});document.getElementById("tier-info").innerHTML="<div class='ir'><span style='color:#ef4444'>Skeleton</span><span class='iv'>"+ts.s.toLocaleString()+"</span></div><div class='ir'><span style='color:#f97316'>Supporting</span><span class='iv'>"+ts.u+"</span></div><div class='ir'><span style='color:#60a5fa'>Compressible</span><span class='iv'>"+ts.c.toLocaleString()+"</span></div><div class='ir'><span style='color:#6b7280'>Prunable</span><span class='iv'>"+ts.p+"</span></div>";}

  var det="";
  if(xrayOn){det="<div class='db'><b>X-RAY MODE</b><br>Only <span style='color:#f87171;font-weight:700'>skeleton neurons</span> + arterial connections.</div>";}
  else if(mode>=3){det="<div class='db'><b>Skeleton:</b> ";D.mlp_tier_counts.forEach(function(cc,l){if(cc.skel>0)det+="L"+l+":<span style='color:#f87171;font-weight:700'>"+cc.skel+"</span> ";});det+="<br><b>Heads:</b> ";for(var l=0;l<NL;l++){var sh=0;for(var hh=0;hh<NH;hh++){if(D.attn_tiers[l][hh]===0)sh++;}if(sh>0)det+="L"+l+":"+sh+"/8"+(sh===8?" ALL!":"")+" ";}det+="</div>";}
  else if(mode===2){det="<div class='db'>Toggle signals. Each highlights <b>different</b> neurons. Bigger = multiple signals.</div>";}
  else{det="<div class='db'><span style='color:#4488aa'>Cyan wireframe</span> = Attention (8 heads)<br><span style='color:#44aa66'>Green wireframe</span> = MLP (gate/up/down)<br>Spheres = neurons inside<br><br>Try <b style='color:#6ee7b7'>Tour</b>!</div>";}
  document.getElementById("det").innerHTML=det;

  var leg="";
  if(xrayOn){leg="<div class='lr'><div class='ld' style='background:#ef4444;box-shadow:0 0 4px #ef4444'></div>Skeleton</div><div style='font-size:7px;color:#ef4444'>Red tubes = circuit</div>";}
  else if(mode===2){sigDefs.forEach(function(s){var on=aSigs.has(s.id);leg+="<div class='lr' style='opacity:"+(on?1:0.3)+"'><div class='ld' style='background:"+s.color+"'></div>"+s.name+"</div>";});}
  else if(mode>=3){leg="<div class='lr'><div class='ld' style='background:#ef4444;box-shadow:0 0 4px #ef4444'></div>Skeleton 16b</div><div class='lr'><div class='ld' style='background:#f97316'></div>Supporting 8b</div><div class='lr'><div class='ld' style='background:#3b82f6;opacity:.5'></div>Compressible 4b</div><div class='lr'><div class='ld' style='background:#6b7280;opacity:.3'></div>Prunable 0b</div>";}
  else{leg="<div class='lr'><div class='ld' style='background:#A0B4C8'></div>MLP Neuron</div><div class='lr'><div class='ld' style='background:#4a6a88'></div>Attn Head</div><div class='lr' style='color:#4488aa;font-size:7px'>--- Attn wireframe</div><div class='lr' style='color:#44aa66;font-size:7px'>--- MLP wireframe</div>";}
  document.getElementById("leg").innerHTML=leg;
}

function onResize(){var w=can.parentElement.clientWidth,h=can.parentElement.clientHeight;cam.aspect=w/h;cam.updateProjectionMatrix();ren.setSize(w,h);}
window.addEventListener("resize",onResize);onResize();

var clock=new THREE.Clock();
function animate(){requestAnimationFrame(animate);if(mode>=3||xrayOn){var t=clock.getElapsedTime();skelLight.intensity=0.4+Math.sin(t*1.2)*0.1;}ren.render(scene,cam);}
build();renderUI();animate();

</script>
</body>
